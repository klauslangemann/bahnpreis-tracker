<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f4f6f8">
  <title>Bahnpreis-Tracker V8.7</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css?v=8.7">
</head>
<body>
  <header class="topbar">
    <div>
      <div class="eyebrow">PREISBEOBACHTUNG</div>
      <h1>Bahnpreis-Tracker</h1>
    </div>
    <span class="version">V8.7</span>
  </header>

  <main>
    <section class="projectbar card">
      <div>
        <label for="projectSelect">Projekt</label>
        <select id="projectSelect"></select>
      </div>
      <div class="travel-date">
        <span>Reisetag</span>
        <strong id="travelDate">–</strong>
      </div>
    </section>

    <section id="routes" class="routes"></section>

    <section class="card actions-card">
      <button id="completeBtn" class="primary">Abfrage abschließen</button>
      <div class="secondary-actions">
        <button id="backupBtn">Vollständiges Backup</button>
        <button id="restoreBtn">Backup wiederherstellen</button>
        <input id="restoreInput" type="file" accept=".json,application/json" hidden>
      </div>
      <p id="globalStatus" class="status"></p>
    </section>
  </main>

  <dialog id="historyDialog">
    <div class="dialog-head">
      <h2 id="historyTitle">Preisverlauf</h2>
      <button id="closeHistory" aria-label="Schließen">×</button>
    </div>
    <canvas id="historyChart" width="700" height="320"></canvas>
    <div id="historyTable"></div>
  </dialog>

  <input id="screenshotInput" type="file" accept="image/*" hidden>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="app.js?v=8.7"></script>
</body>
</html>
